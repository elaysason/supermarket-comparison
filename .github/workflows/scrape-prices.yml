name: Scrape Prices

concurrency:
  group: scrape-prices
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 1,13 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_full:
        description: "Run a full scrape instead of the default update strategy"
        required: false
        default: false
        type: boolean

jobs:
  scrape:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/fix/carrefour-store-471'
    runs-on: [self-hosted, salkal-scraper]
    timeout-minutes: 120

    steps:
      - name: Check out repository
        # actions/checkout@v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up uv
        shell: pwsh
        run: |
          if (Get-Command uv -ErrorAction SilentlyContinue) {
            "UV_RUN=uv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            uv --version
          } else {
            python -m pip install --user uv==0.8.14
            "UV_RUN=python -m uv" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            python -m uv --version
          }

      - name: Install dependencies
        shell: pwsh
        run: Invoke-Expression "$env:UV_RUN sync --frozen"

      - name: Run scraper
        id: run_scraper
        shell: pwsh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FORCE_FULL: ${{ inputs.force_full && '1' || '' }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          New-Item -ItemType Directory -Force -Path "logs" | Out-Null
          $timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
          $logPath = "logs/scraper-$timestamp.log"
          $PSDefaultParameterValues['Out-File:Encoding'] = 'utf8'
          $PSDefaultParameterValues['Tee-Object:Encoding'] = 'utf8'
          "Scraper started at $(Get-Date -Format o)" | Tee-Object -FilePath $logPath

          $scheduledFullCheck = $env:GITHUB_EVENT_NAME -eq "schedule" -and $env:SCHEDULE -eq "0 2 * * *"
          $epochDays = [int][Math]::Floor([DateTimeOffset]::UtcNow.ToUnixTimeSeconds() / 86400)
          $scheduledFull = $scheduledFullCheck -and ($epochDays % 2 -eq 0)
          $effectiveForceFull = $env:FORCE_FULL -eq "1" -or $scheduledFull
          "effective_force_full=$($effectiveForceFull.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          if ($scheduledFullCheck -and -not $scheduledFull) {
            "Skipping full scrape on off day." | Tee-Object -FilePath $logPath -Append
            "" | Tee-Object -FilePath $logPath -Append
            "=== Scraping Summary ===" | Tee-Object -FilePath $logPath -Append
            "  Scheduled full scrape skipped on off day." | Tee-Object -FilePath $logPath -Append
            exit 0
          }

          if ($effectiveForceFull) {
            Invoke-Expression "$env:UV_RUN run python -m app.main --force-full" 2>&1 | Tee-Object -FilePath $logPath -Append
          } else {
            Invoke-Expression "$env:UV_RUN run python -m app.main" 2>&1 | Tee-Object -FilePath $logPath -Append
          }
          $exitCode = $LASTEXITCODE
          "Scraper finished at $(Get-Date -Format o) with exit code $exitCode" | Tee-Object -FilePath $logPath -Append
          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Upload scraper logs
        id: upload_scraper_logs
        if: always()
        # actions/upload-artifact@v7.0.1
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scraper-logs-${{ github.run_id }}
          path: logs/*.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Email scrape result
        if: always()
        continue-on-error: true
        shell: pwsh
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SCRAPE_MAIL_FROM: ${{ vars.SCRAPE_MAIL_FROM }}
          SCRAPE_MAIL_TO: ${{ vars.SCRAPE_MAIL_TO }}
          SCRAPE_STATUS: ${{ steps.run_scraper.outcome }}
          SCRAPE_LOGS_URL: ${{ steps.upload_scraper_logs.outputs.artifact-url }}
          FORCE_FULL: ${{ steps.run_scraper.outputs.effective_force_full }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: .github/scripts/send-scrape-email.ps1
