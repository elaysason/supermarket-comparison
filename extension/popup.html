<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart Sniper</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
    }

    body {
      position: relative;
      overflow: hidden;
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #f1f5f9;
      background:
        radial-gradient(circle at top, rgba(245, 158, 11, 0.14), transparent 36%),
        linear-gradient(180deg, #111827 0%, #0f172a 55%, #020617 100%);
      width: 320px;
      min-height: 230px;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(135deg, rgba(245, 158, 11, 0.08), transparent 30%),
        linear-gradient(330deg, rgba(148, 163, 184, 0.08), transparent 42%);
    }

    header,
    main {
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px 12px;
      background: rgba(15, 23, 42, 0.72);
      border-bottom: 1px solid rgba(51, 65, 85, 0.75);
    }

    .brand {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }

    .header-accent {
      width: 4px;
      height: 30px;
      background: linear-gradient(180deg, #fbbf24, #f59e0b);
      border-radius: 999px;
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.32);
      flex-shrink: 0;
    }

    .header-title {
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fbbf24;
    }

    .header-subtitle {
      margin-top: 5px;
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
    }

    .header-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(245, 158, 11, 0.22);
      background: rgba(245, 158, 11, 0.1);
      color: #fbbf24;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    main {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card,
    .hint-card {
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.92), rgba(15, 23, 42, 0.88));
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.04),
        0 16px 30px rgba(2, 6, 23, 0.28);
    }

    .status-card[data-state="active"] {
      border-color: rgba(245, 158, 11, 0.42);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 0 1px rgba(245, 158, 11, 0.08),
        0 18px 34px rgba(2, 6, 23, 0.34);
    }

    .status-card[data-state="supported"],
    .status-card[data-state="checking"] {
      border-color: rgba(100, 116, 139, 0.48);
    }

    .status-card[data-state="error"] {
      border-color: rgba(239, 68, 68, 0.38);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #475569;
    }

    .dot-active {
      background: #f59e0b;
      box-shadow:
        0 0 0 4px rgba(245, 158, 11, 0.12),
        0 0 12px rgba(245, 158, 11, 0.35);
    }

    .dot-supported {
      background: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.12);
    }

    .dot-inactive {
      background: #475569;
    }

    .dot-error {
      background: #ef4444;
      box-shadow:
        0 0 0 4px rgba(239, 68, 68, 0.12),
        0 0 12px rgba(239, 68, 68, 0.25);
    }

    #status-tone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(148, 163, 184, 0.1);
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-card[data-state="active"] #status-tone {
      border-color: rgba(245, 158, 11, 0.28);
      background: rgba(245, 158, 11, 0.12);
      color: #fbbf24;
    }

    .status-card[data-state="error"] #status-tone {
      border-color: rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
    }

    #site-label {
      min-height: 16px;
      margin-bottom: 8px;
      color: #e2e8f0;
      font-size: 12px;
      line-height: 1.5;
    }

    #status-description,
    .hint-text {
      font-size: 12px;
      line-height: 1.7;
      color: #94a3b8;
    }

    .hint-title {
      margin-bottom: 10px;
      color: #64748b;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .store-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .store-chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid rgba(71, 85, 105, 0.65);
      background: rgba(15, 23, 42, 0.8);
      color: #e2e8f0;
      font-size: 12px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="header-accent"></span>
      <div>
        <div class="header-title">Cart Sniper</div>
        <div class="header-subtitle">השוואת סל קניות מול רשתות מתחרות בזמן אמת</div>
      </div>
    </div>
    <span class="header-pill">Live</span>
  </header>
  <main>
    <section id="status-card" class="status-card" data-state="checking">
      <div class="status-row">
        <div id="status-badge">
          <span id="status-dot" class="dot-supported"></span>
          <span id="status-text">בודק...</span>
        </div>
        <span id="status-tone">בדיקה</span>
      </div>
      <div id="site-label"></div>
      <p id="status-description">פותח את הלשונית הפעילה ובודק אם מדובר בדף עגלה נתמך.</p>
    </section>

    <section class="hint-card">
      <div class="hint-title">תמיכה נוכחית</div>
      <div class="store-list">
        <span class="store-chip">שופרסל</span>
        <span class="store-chip">רמי לוי</span>
        <span class="store-chip">יוחננוף</span>
      </div>
      <p class="hint-text">כשתגיע לעגלת הקניות באתר נתמך, ההשוואה תרוץ אוטומטית מתוך העמוד.</p>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
