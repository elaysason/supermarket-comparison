<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סל קל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
    }

    body {
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #e5e7eb;
      background: #0b1220;
      width: 320px;
      min-height: 220px;
    }

    header {
      padding: 16px 16px 12px;
      background: #111827;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      color: #f8fafc;
    }

    .header-subtitle {
      margin-top: 4px;
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
    }

    main {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card,
    .support-card {
      border: 1px solid rgba(51, 65, 85, 0.85);
      border-radius: 12px;
      background: #0f172a;
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.16);
    }

    .status-card {
      padding: 14px;
    }

    .support-card {
      padding: 12px 14px;
    }

    .status-card[data-state="active"] {
      border-color: rgba(245, 158, 11, 0.42);
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.08), rgba(15, 23, 42, 0.95));
    }

    .status-card[data-state="supported"],
    .status-card[data-state="checking"] {
      border-color: rgba(100, 116, 139, 0.48);
    }

    .status-card[data-state="inactive"] {
      border-color: rgba(71, 85, 105, 0.58);
    }

    .status-card[data-state="error"] {
      border-color: rgba(239, 68, 68, 0.38);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #64748b;
    }

    .dot-active {
      background: #f59e0b;
    }

    .dot-supported {
      background: #94a3b8;
    }

    .dot-inactive {
      background: #64748b;
    }

    .dot-error {
      background: #ef4444;
    }

    #status-tone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 0;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-card[data-state="active"] #status-tone {
      color: #fbbf24;
    }

    .status-card[data-state="error"] #status-tone {
      color: #fca5a5;
    }

    #site-label {
      min-height: 18px;
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }

    #status-description,
    .hint-text {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #94a3b8;
    }

    .section-title {
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .store-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .store-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
    }

    .store-item:first-child {
      padding-top: 0;
      border-top: none;
    }

    .store-name {
      color: #e2e8f0;
      font-size: 12px;
    }

    .store-status {
      color: #94a3b8;
      font-size: 12px;
    }

    .store-item-active .store-status {
      color: #fbbf24;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">סל קל</div>
    <div class="header-subtitle">השוואת סל בעמודי עגלה נתמכים</div>
  </header>
  <main>
    <section id="status-card" class="status-card" data-state="checking">
      <div class="status-row">
        <div id="status-badge">
          <span id="status-dot" class="dot-supported"></span>
          <span id="status-text">בודק...</span>
        </div>
        <span id="status-tone">בדיקה</span>
      </div>
      <div id="site-label"></div>
      <p id="status-description">פותח את הלשונית הפעילה ובודק אם מדובר בדף עגלה נתמך.</p>
    </section>

    <section class="support-card">
      <div class="section-title">רשתות נתמכות</div>
      <ul id="store-list" class="store-list"></ul>
      <p class="hint-text">כשתגיע לעגלת הקניות באתר נתמך, ההשוואה תרוץ אוטומטית מתוך העמוד.</p>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
