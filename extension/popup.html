<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart Sniper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: #111827;
      background: #ffffff;
      width: 220px;
      min-height: 80px;
    }

    header {
      background: #1d4ed8;
      color: #ffffff;
      padding: 10px 14px;
      font-weight: 700;
      font-size: 14px;
    }

    main {
      padding: 14px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-active   { background: #16a34a; }
    .dot-inactive { background: #9ca3af; }

    #site-label {
      margin-top: 8px;
      font-size: 11px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <header>&#x1F3AF; Cart Sniper</header>
  <main>
    <div id="status-badge">
      <span id="status-dot" class="dot-inactive"></span>
      <span id="status-text">בודק...</span>
    </div>
    <div id="site-label"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
