<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סל קל</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: dark;
    }

    body {
      font-family: 'Rubik', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #e5e7eb;
      background:
        radial-gradient(circle at 100% 0%, rgba(245, 158, 11, 0.18), transparent 34%),
        linear-gradient(160deg, #07111d 0%, #0b1220 52%, #111827 100%);
      width: 320px;
      min-height: 270px;
    }

    header {
      padding: 16px 16px 12px;
      background: rgba(17, 24, 39, 0.72);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-copy {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .header-title {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.2;
      color: #f8fafc;
    }

    .header-logo {
      display: block;
      width: 32px;
      height: 32px;
      object-fit: contain;
      flex-shrink: 0;
    }

    .header-subtitle {
      margin-top: 2px;
      font-size: 12px;
      line-height: 1.5;
      color: #94a3b8;
    }

    main {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card,
    .support-card {
      border: 1px solid rgba(51, 65, 85, 0.85);
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.92);
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.16);
    }

    .status-card {
      overflow: hidden;
      padding: 14px;
    }

    .support-card {
      padding: 12px 14px;
    }

    .status-card[data-state="active"] {
      border-color: rgba(245, 158, 11, 0.42);
      background: linear-gradient(180deg, rgba(245, 158, 11, 0.08), rgba(15, 23, 42, 0.95));
    }

    .status-card[data-state="supported"],
    .status-card[data-state="checking"] {
      border-color: rgba(100, 116, 139, 0.48);
    }

    .status-card[data-state="inactive"] {
      border-color: rgba(71, 85, 105, 0.58);
    }

    .status-card[data-state="error"] {
      border-color: rgba(239, 68, 68, 0.38);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    #status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 15px;
      font-weight: 600;
      color: #f8fafc;
    }

    #status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #64748b;
    }

    .dot-active {
      background: #f59e0b;
    }

    .dot-supported {
      background: #94a3b8;
    }

    .dot-inactive {
      background: #64748b;
    }

    .dot-error {
      background: #ef4444;
    }

    #status-tone {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      padding: 0;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-card[data-state="active"] #status-tone {
      color: #fbbf24;
    }

    .status-card[data-state="error"] #status-tone {
      color: #fca5a5;
    }

    #site-label {
      min-height: 18px;
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.5;
    }

    #status-description,
    .hint-text {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.6;
      color: #94a3b8;
    }

    .status-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .status-actions[hidden] {
      display: none;
    }

    .action-button {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 9px 11px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
    }

    .action-button:focus-visible {
      outline: 2px solid rgba(251, 191, 36, 0.85);
      outline-offset: 2px;
    }

    .action-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .action-button:disabled {
      cursor: default;
      opacity: 0.62;
    }

    .primary-action {
      flex: 1;
      color: #111827;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.18);
    }

    .secondary-action {
      color: #e2e8f0;
      background: rgba(15, 23, 42, 0.65);
      border-color: rgba(148, 163, 184, 0.22);
    }

    .secondary-action[hidden] {
      display: none;
    }

    .section-title {
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .store-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .store-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.08);
    }

    .store-item:first-child {
      padding-top: 0;
      border-top: none;
    }

    .store-button {
      appearance: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 12px;
      border: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      text-align: inherit;
      cursor: pointer;
    }

    .store-button:focus-visible {
      outline: 2px solid rgba(251, 191, 36, 0.75);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .store-name {
      color: #e2e8f0;
      font-size: 12px;
    }

    .store-status {
      color: #94a3b8;
      font-size: 12px;
    }

    .store-item-active .store-status {
      color: #fbbf24;
      font-weight: 600;
    }

    @media (prefers-reduced-motion: reduce) {
      .action-button {
        transition: none;
      }

      .action-button:hover:not(:disabled) {
        transform: none;
      }
    }
  </style>
</head>
  <body>
  <header>
    <div class="header-brand">
      <img class="header-logo" src="icons/sal_kal_v1-cropped.png" alt="סל קל" />
      <div class="header-copy">
        <div class="header-title">סל קל</div>
        <div class="header-subtitle">השוואת סל בעמודי עגלה נתמכים</div>
      </div>
    </div>
  </header>
  <main>
    <section id="status-card" class="status-card" data-state="checking" role="status" aria-live="polite">
      <div class="status-row">
        <div id="status-badge">
          <span id="status-dot" class="dot-supported"></span>
          <span id="status-text">בודק...</span>
        </div>
        <span id="status-tone">בדיקה</span>
      </div>
      <div id="site-label"></div>
      <p id="status-description">פותח את הלשונית הפעילה ובודק אם מדובר בדף עגלה נתמך.</p>
      <div class="status-actions">
        <button id="primary-action" class="action-button primary-action" type="button" disabled>בודק...</button>
        <button id="secondary-action" class="action-button secondary-action" type="button" hidden></button>
      </div>
    </section>

    <section class="support-card">
      <div class="section-title">רשתות נתמכות</div>
      <ul id="store-list" class="store-list"></ul>
      <p class="hint-text">כשתגיע לעגלת הקניות באתר נתמך, ההשוואה תרוץ אוטומטית מתוך העמוד.</p>
    </section>
  </main>
  <script src="popup.js"></script>
</body>
</html>
